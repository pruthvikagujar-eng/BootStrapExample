<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body class="container">
        <h2 class="text-center">Contact Us</h2>
        <div class="row">
             <div class="col">
             <img src="https://placehold.co/400x400/000000/FFFFFF/png" class="m-5">
             </div>
             <div class="col">
                <form action=" class"="m-5">
                    <div class="mb-3 mt-3">
                        <label for="name">Name:</label>
                        <input type="Name" class="form-control" id="name" placeholder="Enter name" name="name">
                    </div>
                    <div class="mb-3 mt-3">
                        <label for="email">Email:</label>
                        <input type="email" class="form-control" id="email" placeholder="Enter email" name="email">
                    </div>
                    <div class="mb-3 mt-3">
                        <label for="pwd">Password:</label>
                        <input type="password" class="form-control" id="pwd" placeholder="Enter password" name="pswds">
                    </div>
                    <div class="mb-3 mt-3">
                        <label for="age">Age:</label>
                        <input type="age" class="form-control" id="age" placeholder="Enter age" name="age">
                    </div>
                    <div class="text-center">
                    <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                    </form>
             </div>
        </div>
    </body>
</html>
